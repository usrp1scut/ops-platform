version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  migrate:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MIGRATIONS_DIR: /app/migrations
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    entrypoint: ["/bin/migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  ops-api:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_HTTP_ADDR: ":8080"
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MASTER_KEY: 01234567890123456789012345678901
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
