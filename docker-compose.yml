version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  guacd:
    image: guacamole/guacd:1.5.5
    # No host port mapping: ops-api reaches guacd over the compose network
    # (OPS_GUACD_ADDR=guacd:4822). Binding 4822 on the host is unnecessary
    # and collides with Windows' Hyper-V reserved port ranges.
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  migrate:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MIGRATIONS_DIR: /app/migrations
      GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    entrypoint: ["/bin/migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  ops-api:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_HTTP_ADDR: ":8080"
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MASTER_KEY: "${OPS_MASTER_KEY:-01234567890123456789012345678901}"
      OPS_LOCAL_ADMIN_USERNAME: ${OPS_LOCAL_ADMIN_USERNAME-admin}
      OPS_LOCAL_ADMIN_PASSWORD: ${OPS_LOCAL_ADMIN_PASSWORD-admin123456}
      OPS_OIDC_ISSUER_URL: ${OPS_OIDC_ISSUER_URL-}
      OPS_OIDC_CLIENT_ID: ${OPS_OIDC_CLIENT_ID-}
      OPS_OIDC_CLIENT_SECRET: ${OPS_OIDC_CLIENT_SECRET-}
      OPS_OIDC_REDIRECT_URL: ${OPS_OIDC_REDIRECT_URL-}
      OPS_OIDC_AUTHORIZE_URL: ${OPS_OIDC_AUTHORIZE_URL-}
      OPS_OIDC_TOKEN_URL: ${OPS_OIDC_TOKEN_URL-}
      OPS_OIDC_USERINFO_URL: ${OPS_OIDC_USERINFO_URL-}
      OPS_OIDC_SCOPES: ${OPS_OIDC_SCOPES-}
      OPS_OIDC_BOOTSTRAP_ADMIN_SUBS: ${OPS_OIDC_BOOTSTRAP_ADMIN_SUBS-}
      OPS_GUACD_ADDR: ${OPS_GUACD_ADDR-guacd:4822}
      OPS_GUAC_TUNNEL_HOST: ${OPS_GUAC_TUNNEL_HOST-ops-api}
      OPS_RECORDING_ENDPOINT: ${OPS_RECORDING_ENDPOINT-minio:9000}
      OPS_RECORDING_ACCESS_KEY: ${OPS_RECORDING_ACCESS_KEY-minio}
      OPS_RECORDING_SECRET_KEY: ${OPS_RECORDING_SECRET_KEY-miniopassword}
      OPS_RECORDING_BUCKET: ${OPS_RECORDING_BUCKET-ops-platform-recordings}
      OPS_RECORDING_USE_SSL: ${OPS_RECORDING_USE_SSL-false}
      GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      guacd:
        condition: service_started

  ops-worker:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MASTER_KEY: "${OPS_MASTER_KEY:-01234567890123456789012345678901}"
      OPS_SYNC_INTERVAL: ${OPS_SYNC_INTERVAL-15m}
      OPS_SYNC_RUN_ON_START: ${OPS_SYNC_RUN_ON_START-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN-}
      GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    entrypoint: ["/bin/ops-worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  bastion-probe:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_DATABASE_URL: postgres://ops:ops@postgres:5432/ops_platform?sslmode=disable
      OPS_MASTER_KEY: "${OPS_MASTER_KEY:-01234567890123456789012345678901}"
      OPS_PROBE_INTERVAL: ${OPS_PROBE_INTERVAL-30m}
      OPS_PROBE_RUN_ON_START: ${OPS_PROBE_RUN_ON_START-true}
      OPS_PROBE_TIMEOUT: ${OPS_PROBE_TIMEOUT-20s}
      OPS_PROBE_CONCURRENCY: ${OPS_PROBE_CONCURRENCY-4}
      OPS_PROBE_BATCH_SIZE: ${OPS_PROBE_BATCH_SIZE-200}
      GOPROXY: ${GOPROXY-https://goproxy.cn,direct}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
    entrypoint: ["/bin/bastion-probe"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Frontend. Builds the Vite/React SPA and serves it behind nginx,
  # reverse-proxying the API surface (/api /auth /healthz /ws) to ops-api on
  # the same origin. ops-api is API-only and embeds no UI, so this is the
  # only thing that serves the console — in every environment.
  web:
    build:
      context: ./web
      args:
        VITE_BASE: ${VITE_BASE-/}
        OPS_API_UPSTREAM: ${OPS_API_UPSTREAM-ops-api:8080}
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
    environment:
      OPS_API_UPSTREAM: ${OPS_API_UPSTREAM-ops-api:8080}
    # Lets the container talk to a host-side ops-api when running
    # standalone (e.g. local dev: `OPS_API_UPSTREAM=host.docker.internal:8080`).
    # No-op in production where OPS_API_UPSTREAM points at the compose
    # service or an external DNS name.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:80"
    depends_on:
      ops-api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
